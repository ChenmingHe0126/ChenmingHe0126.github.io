<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint with Music - Gesture & Mouse</title>
    
    <!-- Import External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.25/Tone.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ml5@latest/dist/ml5.min.js"></script>

    <!-- Import Custom CSS -->
    <link rel="stylesheet" href="../css/drawingAppStyles.css">
</head>

<body>
    <a href="../../demos.html" style="position:fixed;top:14px;right:14px;z-index:99999;font:600 14px/1 Arial,Helvetica,sans-serif;color:#38605e;background:rgba(255,255,255,0.9);padding:8px 12px;border-radius:6px;text-decoration:none;box-shadow:0 1px 4px rgba(0,0,0,0.15);">← Demos</a>

    <h1>🎨 Paint with Music 🎶</h1>
    <p>Choose a mode: Draw with a mouse or use hand gestures.</p>

    <div class="switch-container">
        <label class="switch">
            <input type="checkbox" id="mode-toggle">
            <span class="slider"></span>
        </label>
        <span id="mode-label">🖱 Mouse Mode</span>
    </div>

    <div id="canvas-container"></div>

    <div class="button-container">
        <button id="play-button">▶️ Play Composition</button>
        <button id="clear-button">🗑 Clear Canvas</button>
        <button id="guidance-button">📏 Guidance</button>
    </div>

    <!-- Import Custom JavaScript -->
    <script src="../js/drawingAppScript.js"></script>
</body>

</html>
