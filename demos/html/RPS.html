<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rock Paper Scissors</title>
        <link rel="stylesheet" href="../css/RPS.css">
    </head>

    <body>
    <a href="../../demos.html" style="position:fixed;top:14px;right:14px;z-index:99999;font:600 14px/1 Arial,Helvetica,sans-serif;color:#38605e;background:rgba(255,255,255,0.9);padding:8px 12px;border-radius:6px;text-decoration:none;box-shadow:0 1px 4px rgba(0,0,0,0.15);">← Demos</a>
        <div class="game-container">
            <h1>Rock Paper Scissors</h1>
            <p>Choose your move:</p>
            <div class="buttons">
                <button class="choice" id="rock">✊ Rock</button>
                <button class="choice" id="paper">✋ Paper</button>
                <button class="choice" id="scissors">✌️ Scissors</button>
            </div>
            <div class="result-container">
                <p><strong>Your choice:</strong> <span id="user-choice">-</span></p>
                <p><strong>Computer's choice:</strong> <span id="computer-choice">-</span></p>
                <p class="result"><strong>Result:</strong> <span id="result-text">-</span></p>
            </div>
            <button id="reset">Play Again</button>
        </div>


<!-- JavaScript -->
        <script src="../js/RPS.js"></script>
        
    </body>
</html>
